<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Admin Login - Marigold English Boarding School</title>
    
    <!-- Dynamic Favicon Loader -->
    <script src="/js/favicon-loader.js"></script>
    
    <link rel="stylesheet" href="css/admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href='https://unboxicons.com/2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f8f9fa;
            background-image: radial-gradient(circle, #e9ecef 1px, transparent 1px);
            background-size: 20px 20px;
            padding: 20px;
            gap: 20px;
        }

        .login-card {
            background: white;
            border-radius: 16px;
            padding: 48px 40px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 400px;
            border: 1px solid #e5e7eb;
        }

        .back-to-website-card {
            background: white;
            border-radius: 12px;
            padding: 16px 24px;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 400px;
            border: 1px solid #e5e7eb;
            text-align: center;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        #loginBtn .loading::before{
            display: none !important;
        }

        .login-title {
            font-size: 28px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 0;
            font-family: 'Poppins', sans-serif;
        }

        .login-form {
            display: flex;
            flex-direction: column;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-weight: 500;
            color: #374151;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .form-input {
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s ease;
            background: white;
            color: #1f2937;
        }

        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-input.error {
            border-color: #ef4444;
        }

        .form-input::placeholder {
            color: #9ca3af;
        }

        .error-message {
            color: #ef4444;
            font-size: 12px;
            margin-top: 4px;
        }

        .login-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
        }

        .login-btn:hover {
            background: #2563eb;
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .forgot-password {
            text-align: center;
            margin-top: 16px;
        }

        .forgot-password a {
            color: #3b82f6;
            text-decoration: none;
            font-size: 14px;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .back-to-website-btn {
            background: white;
            color: #374151;
            border: 1px solid #d1d5db;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
        }

        .back-to-website-btn:hover {
            background: #f9fafb;
            border-color: #9ca3af;
        }

        .loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            animation: fadeIn 0.3s ease-in-out;
            position: relative;
            padding: 0.3rem !important;
        }

        .spinner {
            width: 18px;
            left: 67px !important;
            position: absolute;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;   
        }

        .loading span {
            position: relative;
            color: white;
            font-size: 14px;
            top: -7px;
            font-weight: 500;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .btn-text {
            transition: all 0.3s ease;
        }

        .login-btn:disabled .btn-text {
            opacity: 0;
            transform: translateY(-5px);
        }

        .login-btn:disabled .loading {
            display: flex;
        }

        .login-btn.loading-active {
            position: relative;
            overflow: hidden;
        }

        .login-btn.loading-active::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert.error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        .alert.success {
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }
            
            .login-title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1 class="login-title">Admin Login</h1>
            </div>

            <div class="alert error" id="errorAlert"></div>
            <div class="alert success" id="successAlert"></div>

            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="email" class="form-label">Email ID</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="Enter your email" required>
                    <div class="error-message" id="emailError"></div>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" required>
                    <div class="error-message" id="passwordError"></div>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <span class="btn-text">Login</span>
                    <div class="loading">
                        <div class="spinner"></div>
                        <span>Signing in...</span>
                    </div>
                </button>
            </form>

            <div class="forgot-password">
                <a href="/admin/forgot-password" id="forgotPasswordLink">Forgot your password?</a>
            </div>
        </div>

        <div class="back-to-website-card">
            <a href="/" target="_blank" class="back-to-website-btn">Back to the main website</a>
        </div>
    </div>

    <script>
        class AdminLogin {
            constructor() {
                this.form = document.getElementById('loginForm');
                this.emailInput = document.getElementById('email');
                this.passwordInput = document.getElementById('password');
                this.loginBtn = document.getElementById('loginBtn');
                this.errorAlert = document.getElementById('errorAlert');
                this.successAlert = document.getElementById('successAlert');
                this.authCheckInProgress = false;
                this.isRedirecting = false;
                
                this.bindEvents();
                this.checkAuthStatus();
            }

            bindEvents() {
                this.form.addEventListener('submit', (e) => this.handleLogin(e));
                
                // Clear errors on input
                this.emailInput.addEventListener('input', () => this.clearError('email'));
                this.passwordInput.addEventListener('input', () => this.clearError('password'));
            }

            async checkAuthStatus() {
                console.log('🔍 LOGIN PAGE: Starting auth check...');
                
                // Prevent multiple simultaneous auth checks or if already redirecting
                if (this.authCheckInProgress || this.isRedirecting) {
                    console.log('⚠️ LOGIN PAGE: Auth check already in progress or redirecting, skipping...');
                    return;
                }
                
                // Check if we've been redirected from admin page (prevent redirect loop)
                const urlParams = new URLSearchParams(window.location.search);
                const fromAdmin = urlParams.get('from') === 'admin';
                
                const token = localStorage.getItem('adminToken');
                console.log('🔑 LOGIN PAGE: Token exists:', !!token);
                console.log('🔙 LOGIN PAGE: Redirected from admin:', fromAdmin);
                
                if (!token) {
                    console.log('❌ LOGIN PAGE: No token found, staying on login page');
                    return;
                }
                
                // If redirected from admin page, don't auto-redirect back (prevent loop)
                if (fromAdmin) {
                    console.log('⚠️ LOGIN PAGE: Redirected from admin, clearing invalid token and staying on login');
                    localStorage.removeItem('adminToken');
                    localStorage.removeItem('adminUser');
                    // Show message to user
                    this.showErrorAlert('Your session has expired. Please log in again.');
                    // Clear the URL parameter
                    window.history.replaceState({}, document.title, window.location.pathname);
                    return;
                }
                
                this.authCheckInProgress = true;
                console.log('🚀 LOGIN PAGE: Making auth request to /api/auth/me');
                
                    try {
                        const response = await fetch('/api/auth/me', {
                            headers: {
                                'Authorization': `Bearer ${token}`
                            }
                        });
                    
                    console.log('📡 LOGIN PAGE: Auth response status:', response.status);
                        
                        if (response.ok) {
                            // User is already authenticated, set cookie and redirect to admin panel
                        console.log('✅ LOGIN PAGE: User already authenticated, setting cookie and redirecting to admin panel');
                        
                        // Mark as redirecting to prevent further auth checks
                        this.isRedirecting = true;
                        
                        // Ensure cookie is set for server-side authentication
                        const isSecure = window.location.protocol === 'https:';
                        document.cookie = `adminToken=${token}; path=/; max-age=86400; ${isSecure ? 'secure;' : ''} samesite=strict`;
                        
                        console.log('🔄 LOGIN PAGE: Cookie set, redirecting to /admin');
                        // Redirect immediately since cookie is now set
                        window.location.replace('/admin');
                        } else if (response.status === 429) {
                        // Rate limited - don't redirect, just log warning and clear token
                        console.warn('⚠️ LOGIN PAGE: Rate limit exceeded during auth check. Clearing token and staying on login page.');
                        localStorage.removeItem('adminToken');
                        localStorage.removeItem('adminUser');
                    } else if (response.status === 401) {
                        // Unauthorized - token is invalid, clear it
                        console.log('❌ LOGIN PAGE: Token invalid (401), clearing from storage');
                        localStorage.removeItem('adminToken');
                        localStorage.removeItem('adminUser');
                    } else {
                        // Other error - clear token to prevent redirect loop
                        console.log('⚠️ LOGIN PAGE: Auth check failed with status:', response.status, 'clearing token');
                        localStorage.removeItem('adminToken');
                        localStorage.removeItem('adminUser');
                        }
                    } catch (error) {
                    console.error('💥 LOGIN PAGE: Auth check error:', error);
                        // Clear token on any error to prevent redirect loop
                        console.log('❌ LOGIN PAGE: Clearing token due to error');
                        localStorage.removeItem('adminToken');
                        localStorage.removeItem('adminUser');
                } finally {
                    this.authCheckInProgress = false;
                    console.log('🏁 LOGIN PAGE: Auth check completed');
                }
            }

            async handleLogin(e) {
                e.preventDefault();
                
                this.setLoading(true);
                this.clearAllErrors();
                this.hideAlerts();

                const email = this.emailInput.value.trim();
                const password = this.passwordInput.value;

                // Basic validation
                if (!email) {
                    this.showError('email', 'Email is required');
                    this.setLoading(false);
                    return;
                }

                if (!password) {
                    this.showError('password', 'Password is required');
                    this.setLoading(false);
                    return;
                }

                try {
                    const response = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ email, password })
                    });

                    const data = await response.json();

                    if (response.ok && data.success) {
                        // Mark as redirecting to prevent further auth checks
                        this.isRedirecting = true;
                        
                        // Store token in localStorage
                        localStorage.setItem('adminToken', data.data.token);
                        localStorage.setItem('adminUser', JSON.stringify(data.data.user));
                        
                        // Store token in cookie for server-side authentication
                        const isSecure = window.location.protocol === 'https:';
                        document.cookie = `adminToken=${data.data.token}; path=/; max-age=86400; ${isSecure ? 'secure;' : ''} samesite=strict`;
                        
                        this.showSuccess('Login successful! Redirecting...');
                        
                        // Redirect to admin panel
                        setTimeout(() => {
                            window.location.replace('/admin');
                        }, 500);
                    } else {
                        this.showErrorAlert(data.message || 'Login failed');
                    }
                } catch (error) {
                    console.error('Login error:', error);
                    this.showErrorAlert('Network error. Please try again.');
                } finally {
                    this.setLoading(false);
                }
            }

            setLoading(loading) {
                if (loading) {
                    this.loginBtn.disabled = true;
                    this.loginBtn.classList.add('loading-active');
                } else {
                    this.loginBtn.disabled = false;
                    this.loginBtn.classList.remove('loading-active');
                }
            }

            showError(field, message) {
                const errorElement = document.getElementById(`${field}Error`);
                const inputElement = document.getElementById(field);
                
                if (errorElement) {
                    errorElement.textContent = message;
                    errorElement.style.display = 'block';
                }
                
                if (inputElement) {
                    inputElement.classList.add('error');
                }
            }

            clearError(field) {
                const errorElement = document.getElementById(`${field}Error`);
                const inputElement = document.getElementById(field);
                
                if (errorElement) {
                    errorElement.textContent = '';
                    errorElement.style.display = 'none';
                }
                
                if (inputElement) {
                    inputElement.classList.remove('error');
                }
            }

            clearAllErrors() {
                this.clearError('email');
                this.clearError('password');
            }

            showErrorAlert(message) {
                this.errorAlert.textContent = message;
                this.errorAlert.style.display = 'block';
                this.successAlert.style.display = 'none';
            }

            showSuccess(message) {
                this.successAlert.textContent = message;
                this.successAlert.style.display = 'block';
                this.errorAlert.style.display = 'none';
            }

            hideAlerts() {
                this.errorAlert.style.display = 'none';
                this.successAlert.style.display = 'none';
            }
        }

        // Initialize login functionality
        document.addEventListener('DOMContentLoaded', () => {
            new AdminLogin();
        });
    </script>
</body>
</html>
