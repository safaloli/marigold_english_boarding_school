<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Forgot Password - Marigold English Boarding School</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href='https://unboxicons.com/2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        .forgot-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f8f9fa;
            background-image: radial-gradient(circle, #e9ecef 1px, transparent 1px);
            background-size: 20px 20px;
            padding: 20px;
            gap: 20px;
        }

        .forgot-card {
            background: white;
            border-radius: 16px;
            padding: 48px 40px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 400px;
            border: 1px solid #e5e7eb;
        }

        .back-to-login-card {
            background: white;
            border-radius: 12px;
            padding: 16px 24px;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 400px;
            border: 1px solid #e5e7eb;
            text-align: center;
        }

        .forgot-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .forgot-title {
            font-size: 28px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 0;
            font-family: 'Poppins', sans-serif;
        }

        .forgot-form {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-weight: 500;
            color: #374151;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .form-input {
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s ease;
            background: white;
            color: #1f2937;
        }

        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-input.error {
            border-color: #ef4444;
        }

        .form-input::placeholder {
            color: #9ca3af;
        }

        .error-message {
            color: #ef4444;
            font-size: 12px;
            margin-top: 4px;
        }

        .forgot-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
        }

        .forgot-btn:hover {
            background: #2563eb;
        }

        .forgot-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .back-to-login-btn {
            background: white;
            color: #374151;
            border: 1px solid #d1d5db;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
        }

        .back-to-login-btn:hover {
            background: #f9fafb;
            border-color: #9ca3af;
        }

        .loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            animation: fadeIn 0.3s ease-in-out;
            position: relative;
            padding: 0.3rem !important;
        }

        .spinner {
            width: 18px;
            left: 67px !important;
            position: absolute;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading span {
            position: relative;
            color: white;
            font-size: 14px;
            top: -7px;
            font-weight: 500;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .btn-text {
            transition: all 0.3s ease;
        }

        .forgot-btn:disabled .btn-text {
            opacity: 0;
            transform: translateY(-5px);
        }

        .forgot-btn:disabled .loading {
            display: flex;
        }

        .forgot-btn.loading-active {
            position: relative;
            overflow: hidden;
        }

        .forgot-btn.loading-active::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert.error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        .alert.success {
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }

        .forgot-description {
            color: #6b7280;
            font-size: 14px;
            text-align: center;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        @media (max-width: 480px) {
            .forgot-card {
                padding: 30px 20px;
            }
            
            .forgot-title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="forgot-container">
        <div class="forgot-card">
            <div class="forgot-header">
                <h1 class="forgot-title">Forgot Password</h1>
            </div>

            <div class="forgot-description">
                Enter your email address and we'll send you a 6-digit code to reset your password.
            </div>

            <div class="alert error" id="errorAlert"></div>
            <div class="alert success" id="successAlert"></div>

            <form class="forgot-form" id="forgotPasswordForm">
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="Enter your email address" required>
                    <div class="error-message" id="emailError"></div>
                </div>

                <button type="submit" class="forgot-btn" id="forgotPasswordBtn">
                    <span class="btn-text">Send Reset Code</span>
                    <div class="loading">
                        <div class="spinner"></div>
                        <span>Sending...</span>
                    </div>
                </button>
            </form>
        </div>

        <div class="back-to-login-card">
            <a href="/admin/login" class="back-to-login-btn">Back to Login</a>
        </div>
    </div>

    <script>
        class ForgotPassword {
            constructor() {
                this.form = document.getElementById('forgotPasswordForm');
                this.emailInput = document.getElementById('email');
                this.forgotBtn = document.getElementById('forgotPasswordBtn');
                this.errorAlert = document.getElementById('errorAlert');
                this.successAlert = document.getElementById('successAlert');
                
                this.bindEvents();
            }

            bindEvents() {
                this.form.addEventListener('submit', (e) => this.handleForgotPassword(e));
                this.emailInput.addEventListener('input', () => this.clearError('email'));
            }

            async handleForgotPassword(e) {
                e.preventDefault();
                
                this.setLoading(true);
                this.clearError('email');
                this.hideAlerts();

                const email = this.emailInput.value.trim();

                if (!email) {
                    this.showError('email', 'Email is required');
                    this.setLoading(false);
                    return;
                }

                // Basic email validation
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    this.showError('email', 'Please enter a valid email address');
                    this.setLoading(false);
                    return;
                }

                try {
                    const response = await fetch('/api/auth/forgot-password', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ email })
                    });

                    const data = await response.json();

                    if (response.ok && data.success) {
                        this.showSuccess('Password reset code sent to your email! Please check your inbox and enter the 6-digit code to reset your password.');
                        this.emailInput.value = '';
                        // Redirect to reset password page after 3 seconds
                        setTimeout(() => {
                            window.location.href = '/admin/reset-password';
                        }, 3000);
                    } else {
                        this.showErrorAlert(data.message || 'Failed to send reset code');
                    }
                } catch (error) {
                    console.error('Forgot password error:', error);
                    this.showErrorAlert('Network error. Please try again.');
                } finally {
                    this.setLoading(false);
                }
            }

            setLoading(loading) {
                if (loading) {
                    this.forgotBtn.disabled = true;
                    this.forgotBtn.classList.add('loading-active');
                } else {
                    this.forgotBtn.disabled = false;
                    this.forgotBtn.classList.remove('loading-active');
                }
            }

            showError(field, message) {
                const errorElement = document.getElementById(`${field}Error`);
                const inputElement = document.getElementById(field);
                
                if (errorElement) {
                    errorElement.textContent = message;
                    errorElement.style.display = 'block';
                }
                
                if (inputElement) {
                    inputElement.classList.add('error');
                }
            }

            clearError(field) {
                const errorElement = document.getElementById(`${field}Error`);
                const inputElement = document.getElementById(field);
                
                if (errorElement) {
                    errorElement.textContent = '';
                    errorElement.style.display = 'none';
                }
                
                if (inputElement) {
                    inputElement.classList.remove('error');
                }
            }

            showErrorAlert(message) {
                this.errorAlert.textContent = message;
                this.errorAlert.style.display = 'block';
                this.successAlert.style.display = 'none';
            }

            showSuccess(message) {
                this.successAlert.textContent = message;
                this.successAlert.style.display = 'block';
                this.errorAlert.style.display = 'none';
            }

            hideAlerts() {
                this.errorAlert.style.display = 'none';
                this.successAlert.style.display = 'none';
            }
        }

        // Initialize forgot password functionality
        document.addEventListener('DOMContentLoaded', () => {
            new ForgotPassword();
        });
    </script>
</body>
</html>
